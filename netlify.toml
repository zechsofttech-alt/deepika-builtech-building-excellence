[[redirects]]
  from = "https://deepikabuiltech.com/*"
  to = "https://www.deepikabuiltech.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://deepikabuiltech.com/*"
  to = "https://www.deepikabuiltech.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build]
  publish = "dist"
  command = "npm run build"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
